<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sale</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='custom-styles.css') }}">
</head>
<body>

<div class="container box">
  <div class="columns">
    <div class="column col-3"></div>

    <div class="column col-6">

      <header class="navbar">
        <section class="navbar-section">
          <a href="/" class="navbar-brand mr-2">
            <div id="logo-header">Stock Manager 3.0</div>
          </a>
          <a href="/" class="btn btn-link">Home</a>
          <a href="/purchase/" class="btn btn-link">Purchase</a>
          <a href="/sale/" class="btn btn-link">Sale</a>
          <a href="/balance/" class="btn btn-link">Balance</a>
          <a href="/history/" class="btn btn-link">History</a>
        </section>
      </header>

      <h1>Sale form</h1>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form action="/sale/" method="post">
        <div class="form-group">
          <label class="form-label" for="product-name">Product name</label>
          <input class="form-input" type="text" id="product-name" name="product_name" placeholder="Product name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="unit-price">Unit price</label>
          <input class="form-input" type="number" id="unit-price" name="unit_price" placeholder="0" min="0" step="0.01" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="pieces">Number of pieces</label>
          <input class="form-input" type="number" id="pieces" name="pieces" placeholder="0" min="1" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit sale</button>
        <button type="reset" class="btn">Reset</button>
      </form>

    </div>

    <div class="column col-3"></div>
  </div>
</div>

</body>
</html>
