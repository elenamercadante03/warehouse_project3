<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='custom-styles.css') }}">
</head>
<body>

<div class="container box">
  <div class="columns">
    <div class="column col-3"></div>

    <div class="column col-6">

      <header class="navbar">
        <section class="navbar-section">
          <a href="/" class="navbar-brand mr-2">
            <div id="logo-header">Stock Manager 3.0</div>
          </a>
          <a href="/" class="btn btn-link">Home</a>
          <a href="/purchase/" class="btn btn-link">Purchase</a>
          <a href="/sale/" class="btn btn-link">Sale</a>
          <a href="/balance/" class="btn btn-link">Balance</a>
          <a href="/history/" class="btn btn-link">History</a>
        </section>
      </header>

      <h1>History</h1>

      <p>This page shows all operations.</p>

      <ul>
        <li>/history/</li>
        <li>/history/&lt;line_from&gt;/&lt;line_to&gt;/</li>
      </ul>

      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>Line</th>
            <th>Operation</th>
            <th>Product</th>
            <th>Value</th>
          </tr>
        </thead>

        <tbody>
          {% for row in history %}
          <tr>
            <td>{{ loop.index }}</td>
            <td>{{ row.operation }}</td>
            <td>{{ row.product }}</td>
            <td>{{ row.value }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>

    <div class="column col-3"></div>
  </div>
</div>

</body>
</html>
