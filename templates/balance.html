<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Balance</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='custom-styles.css') }}">
</head>
<body>

<div class="container box">
  <div class="columns">
    <div class="column col-3"></div>

    <div class="column col-6">

      <header class="navbar">
        <section class="navbar-section">
          <a href="/" class="navbar-brand mr-2">
            <div id="logo-header">Stock Manager 3.0</div>
          </a>
          <a href="/" class="btn btn-link">Home</a>
          <a href="/purchase/" class="btn btn-link">Purchase</a>
          <a href="/sale/" class="btn btn-link">Sale</a>
          <a href="/balance/" class="btn btn-link">Balance</a>
          <a href="/history/" class="btn btn-link">History</a>
        </section>
      </header>

      <h1>Balance change form</h1>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form action="/balance/" method="post">
        <div class="form-group">
          <label class="form-label" for="operation-type">Type of operation</label>
          <select class="form-select" id="operation-type" name="operation_type" required>
            <option value="">Choose operation</option>
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="value">Value</label>
          <input class="form-input" type="number" id="value" name="value" placeholder="0" min="0" step="0.01" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit balance</button>
        <button type="reset" class="btn">Reset</button>
      </form>

    </div>

    <div class="column col-3"></div>
  </div>
</div>

</body>
</html>
